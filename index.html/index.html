                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 bg-zinc-50 dark:bg-zinc-800/40 rounded-xl";
                div.innerHTML = `
                    <span class="font-medium text-sm tracking-tight">${item.word}</span>
                    <span class="text-xs text-zinc-400 font-mono">${item.time}</span>
                `;
                historyList.appendChild(div);
            });
        }

        const historyBtn = document.getElementById('historyBtn');
        const closeHistory = document.getElementById('closeHistory');
        const clearHistory = document.getElementById('clearHistory');

        function toggleHistorySheet(show) {
            if (show) {
                renderHistoryList();
                historySheet.classList.remove('hidden');
                setTimeout(() => {
                    historySheet.classList.add('opacity-100');
                    sheetContent.classList.remove('translate-y-full');
                }, 10);
            } else {
                historySheet.classList.remove('opacity-100');
                sheetContent.classList.add('translate-y-full');
                setTimeout(() => historySheet.classList.add('hidden'), 300);
            }
        }

        historyBtn.addEventListener('click', () => toggleHistorySheet(true));
        closeHistory.addEventListener('click', () => toggleHistorySheet(false));
        historySheet.addEventListener('click', (e) => {
            if (e.target === historySheet) toggleHistorySheet(false);
        });

        clearHistory.addEventListener('click', () => {
            history = [];
            localStorage.removeItem('vocab_history');
            renderHistoryList();
        });

        // --- 6. テーマ切り替え (Dark Mode) ---
        const themeToggle = document.getElementById('themeToggle');
        
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });
        // 👉 ホイール・スクロールイベント（PC用）
        let wheelCooldown = false; // 連続でめくれすぎるのを防ぐフラグ

        card.addEventListener('wheel', e => {
            // スワイプ（ドラッグ）中はホイール処理をスキップ
            if (isDragging) return;

            // トラックパッドなどの微小なスクロールを無視するしきい値
            if (Math.abs(e.deltaX) < 10 && Math.abs(e.deltaY) < 10) return;

            // クールダウン（連打防止）中なら何もしない
            if (wheelCooldown) return;

            // 左右のスクロール（deltaX）、または上下のスクロール（deltaY）のどちらでも反応させる
            // 通常のマウスホイール（上下）でも直感的に動くように e.deltaY も判定に入れています
            const isNext = e.deltaX > 0 || e.deltaY > 0;
            const isPrev = e.deltaX < 0 || e.deltaY < 0;

            if (isNext) {
                // 次の単語へ
                if (currentIndex < wordData.length - 1) {
                    currentIndex++;
                    updateCard();
                    triggerWheelCooldown();
                } else {
                    bounceCard('left');
                }
            } else if (isPrev) {
                // 前の単語へ
                if (currentIndex > 0) {
                    currentIndex--;
                    updateCard();
                    triggerWheelCooldown();
                } else {
                    bounceCard('right');
                }
            }
        });

        // 連続発火を制御する関数（400msの間、次のスクロールを無視）
        function triggerWheelCooldown() {
            wheelCooldown = true;
            setTimeout(() => {
                wheelCooldown = false;
            }, 400); // カードのTransitionアニメーション（0.4s）と同期
        }
        // --- 検索機能のインタラクションとロジック ---
        
        // 検索バーを開く
        searchBtn.addEventListener('click', () => {
            // タイトルと通常ボタンをフェードアウト＆左にスライド
            appTitle.classList.remove('opacity-100', 'translate-x-0');
            appTitle.classList.add('opacity-0', '-translate-x-4', 'pointer-events-none');
            headerActionButtons.classList.remove('opacity-100', 'translate-x-0');
            headerActionButtons.classList.add('opacity-0', 'translate-x-4', 'pointer-events-none');

            // 検索バーをフワッと表示
            searchBarContainer.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
            searchBarContainer.classList.add('opacity-100', 'scale-100');
            
            // 自動で入力欄にフォーカスを合わせる
            setTimeout(() => searchInput.focus(), 150);
        });

        // 検索バーを閉じる関数
        function closeSearchBar() {
            searchInput.value = ''; // 入力をクリア
            
            // UIを元に戻す
            appTitle.classList.remove('opacity-0', '-translate-x-4', 'pointer-events-none');
            appTitle.classList.add('opacity-100', 'translate-x-0');
            headerActionButtons.classList.remove('opacity-0', 'translate-x-4', 'pointer-events-none');
            headerActionButtons.classList.add('opacity-100', 'translate-x-0');

            searchBarContainer.classList.remove('opacity-100', 'scale-100');
            searchBarContainer.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            
            // 検索がクリアされたので、現在のカードの表示を維持（または必要ならupdateCardでリセット）
        }

        closeSearchBtn.addEventListener('click', closeSearchBar);

        // 💡 リアルタイム検索処理（インクリメンタルサーチ）
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query === '') return;

            // wordData の中から、単語名が前方一致（または部分一致）するものを検索
            const foundIndex = wordData.findIndex(item => 
                item.word.toLowerCase().startsWith(query)
            );

            // 見つかったらそのカードへジャンプ
            if (foundIndex !== -1 && foundIndex !== currentIndex) {
                currentIndex = foundIndex;
                updateCard();
            }
        });

        // 検索中に入力欄でEnterを押したら自動でキーボードを閉じる
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                searchInput.blur();
            }
        });
        function shuffleWords() {
            for (let i = wordData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [wordData[i], wordData[j]] = [wordData[j], wordData[i]];
            }
            currentIndex = 0; // 1枚目のカードに戻す
            updateCard();     // 画面を更新
        }
        
        const shuffleBtn = document.getElementById('shuffleBtn');
        if (shuffleBtn) {
            shuffleBtn.addEventListener('click', () => {
                shuffleWords();
            });
        }
        if (glassToggleBtn) {
            glassToggleBtn.addEventListener('click', () => {
                isGlassMode = !isGlassMode;
                const auroraBg = document.getElementById('auroraBg');

                if (isGlassMode) {
                    if (auroraBg) auroraBg.classList.remove('opacity-0');
                    glassToggleBtn.classList.add('text-purple-600', 'dark:text-purple-400');
                } else {
                    if (auroraBg) auroraBg.classList.add('opacity-0');
                    glassToggleBtn.classList.remove('text-purple-600', 'dark:text-purple-400');
                }

                if (isGlassMode) {
                    card.classList.remove('bg-white', 'dark:bg-zinc-900', 'shadow-xl');
                    card.classList.add('bg-white/70', 'dark:bg-zinc-900/60', 'backdrop-blur-xl', 'border', 'border-white/20', 'dark:border-zinc-700/30', 'shadow-2xl', 'shadow-[inset_0_1px_0_0_rgba(255,255,255,0.25)]');
                } else {
                    card.classList.remove('bg-white/70', 'dark:bg-zinc-900/60', 'backdrop-blur-xl', 'border', 'border-white/20', 'dark:border-zinc-700/30', 'shadow-2xl', 'shadow-[inset_0_1px_0_0_rgba(255,255,255,0.25)]');
                    card.classList.add('bg-white', 'dark:bg-zinc-900', 'shadow-xl');
                }
            });
        }
            window.addEventListener('keydown', (e) => {
            // 検索バーの入力欄に文字を打っている時は、ショートカットを無効化する
            if (document.activeElement === document.getElementById('searchInput')) {
                return;
            }

            switch (e.key) {
                case 'ArrowRight':
                case 'd':
                case 'D':
                    // 👉 右矢印キー または 'D' で「次へ」
                    if (currentIndex < wordData.length - 1) {
                        currentIndex++;
                        updateCard();
                    } else {
                        bounceCard('left');
                    }
                    break;

                case 'ArrowLeft':
                case 'a':
                case 'A':
                    // 👈 左矢印キー または 'A' で「前へ」
                    if (currentIndex > 0) {
                        currentIndex--;
                        updateCard();
                    } else {
                        bounceCard('right');
                    }
                    break;

                case ' ': // スペースキー
                    // 🔄 スペースキーで「カードをタップ（日本語/英語の切り替え）」
                    e.preventDefault(); // スペースキーによる画面のスクロールを防止
                    card.click();       // カードをクリックしたのと同じ処理を強制発火
                    break;
                    
                case 's':
                case 'S':
                    // 🔀 'S' キーを押すと、その場で単語をシャッフル！
                    shuffleWords();
                    break;
            }
        });
        // --- 7. 初期化 ---
        lucide.createIcons();
        updateCard();
    </script>
</body>
</html>
